<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>اختبر وضوءك</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    .confetti-piece{position:fixed;top:0;width:10px;height:10px;border-radius:2px;animation:confettiFall 2.5s ease forwards;pointer-events:none;z-index:9999}
    .score-bar-wrap{background:var(--border);border-radius:8px;height:12px;overflow:hidden;margin:10px 0}
    .score-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width 1s ease}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="https://ahmae4d-hash.github.io/Learn_sala/quiz.html" class="navbar-brand"><span>💧</span> اختبار الصلاة</a>
    <ul class="nav-links">
      <li><a href="https://ahmae4d-hash.github.io/Learn_sala/quiz.html" class="active">اختبار الصلاة</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <span class="hero-icon">💧</span>
  <h1>اختبر وضوءك</h1>
  <p>١٠ أسئلة تفاعلية لتقييم مدى فهمك لخطوات الوضوء</p>
</section>

<div class="container">
  <div class="quiz-container">

    <div id="quiz-section">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="prog" style="width:0%"></div>
      </div>

      <div class="quiz-question-card" id="qcard">
        <div class="question-counter" id="qcount">السؤال ١ من ١٠</div>
        <div class="question-text" id="qtext"></div>
        <div class="options-list" id="opts"></div>
        <div class="quiz-feedback" id="feedback"></div>
        <div class="quiz-nav">
          <span id="scorelabel" style="color:var(--text-muted);font-weight:700;font-size:.93rem;"></span>
          <button class="btn-primary" id="next-btn" onclick="next()" style="display:none">التالي ←</button>
        </div>
      </div>
    </div>

    <div class="quiz-result" id="result">
      <div class="result-circle" id="rcircle">
        <div class="result-score" id="rscore">0</div>
        <div class="result-total">/ 10</div>
      </div>
      <div class="result-message" id="rmsg"></div>
      <p id="rsub" style="color:var(--text-muted);margin-bottom:16px;"></p>

      <div style="max-width:380px;margin:0 auto 20px;">
        <div style="display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;color:var(--text-muted);margin-bottom:4px;">
          <span>نسبة النجاح</span><span id="rpct">0%</span>
        </div>
        <div class="score-bar-wrap"><div class="score-bar-fill" id="rbar" style="width:0%"></div></div>
      </div>

      <div class="result-details">
        <div class="result-stat"><div class="val" id="rc">0</div><div class="lbl">صحيحة ✅</div></div>
        <div class="result-stat"><div class="val" id="rw">0</div><div class="lbl">خاطئة ❌</div></div>
        <div class="result-stat"><div class="val" id="rpctstat">0%</div><div class="lbl">النسبة</div></div>
        <div class="result-stat"><div class="val" id="rgrade">-</div><div class="lbl">التقدير</div></div>
      </div>

      <div id="review-list" style="text-align:right;max-width:560px;margin:16px auto;"></div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="restart()">🔄 أعد الاختبار</button>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  <p>موقع <strong>تعلم الصلاة</strong> — دليل تعليمي للمبتدئين والأطفال</p>
</footer>

<script>
var QS = [
  {
    q:"ما أول خطوة في الوضوء؟",
    opts:["غسل الوجه","النية","غسل اليدين","المضمضة"],
    a:1,
    exp:"النية شرط أساسي في الوضوء، وهي في القلب ولا يُشترط النطق بها."
  },
  {
    q:"كم مرة يُغسل الوجه في الوضوء؟",
    opts:["مرة واحدة","مرتان","ثلاث مرات","أربع مرات"],
    a:2,
    exp:"يُغسل الوجه ثلاث مرات، من منبت الشعر إلى أسفل الذقن وبين الأذنين."
  },
  {
    q:"ما حكم مسح الأذنين في الوضوء؟",
    opts:["فرض","سنة","مكروه","لا يوجد"],
    a:1,
    exp:"مسح الأذنين من الداخل والخارج سنة مؤكدة في الوضوء."
  },
  {
    q:"أي اليدين يُبدأ بها في غسل اليدين؟",
    opts:["اليسرى","اليمنى","أي يد","الاثنتان معاً"],
    a:1,
    exp:"يُبدأ باليد اليمنى ثم اليسرى، لأن النبي ﷺ كان يحب التيمن في طهوره."
  },
  {
    q:"إلى أين يمتد غسل الذراعين في الوضوء؟",
    opts:["إلى الرسغ","إلى المرفق","إلى الكتف","إلى المنكب"],
    a:1,
    exp:"يُغسل الذراع من أطراف الأصابع حتى المرفق والمرفق مع ذلك."
  },
  {
    q:"كيف يُمسح الرأس في الوضوء؟",
    opts:["بأصبع واحد","باليد كلها","من الأمام للخلف ثم من الخلف للأمام","أي طريقة"],
    a:2,
    exp:"يُمسح الرأس مرة واحدة ببلل اليدين من مقدمة الرأس إلى مؤخرته ثم إلى المقدمة."
  },
  {
    q:"كم مرة تُغسل القدمان في الوضوء؟",
    opts:["مرة","مرتان","ثلاث مرات","أربع مرات"],
    a:2,
    exp:"تُغسل القدمان ثلاث مرات مع التأكد من إيصال الماء بين الأصابع."
  },
  {
    q:"ما الذي يُنقض الوضوء؟",
    opts:["الأكل","الشرب","النوم العميق","الكلام"],
    a:2,
    exp:"النوم العميق ينقض الوضوء لأنه يُزيل الشعور بما يخرج من الإنسان."
  },
  {
    q:"ما الذي يُقال عند بدء الوضوء؟",
    opts:["الحمد لله","بسم الله","لا إله إلا الله","الله أكبر"],
    a:1,
    exp:"يُستحب قول 'بسم الله' عند بداية الوضوء، وهي سنة مؤكدة."
  },
  {
    q:"ما الدعاء المستحب بعد الانتهاء من الوضوء؟",
    opts:["سبحان الله","أشهد أن لا إله إلا الله وأشهد أن محمداً عبده ورسوله","الحمد لله رب العالمين","لا حول ولا قوة إلا بالله"],
    a:1,
    exp:"يُستحب قول الشهادتين بعد الوضوء: أشهد أن لا إله إلا الله وأن محمداً عبده ورسوله."
  }
];

var LETTERS = ['أ','ب','ج','د'];
var cur=0, score=0, answered=false, userAnswers=[];

function toAr(n){ return String(n).replace(/\d/g,function(d){return '٠١٢٣٤٥٦٧٨٩'[d]}); }

function renderQ(){
  var q=QS[cur];
  document.getElementById('qcount').textContent='السؤال '+toAr(cur+1)+' من ١٠';
  document.getElementById('prog').style.width=(cur/QS.length*100)+'%';
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('scorelabel').textContent='النتيجة: '+score+' / '+cur;
  document.getElementById('next-btn').style.display='none';
  var fb=document.getElementById('feedback');
  fb.className='quiz-feedback'; fb.textContent='';

  var card=document.getElementById('qcard');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='fadeSlideIn .35s ease';

  var list=document.getElementById('opts');
  list.innerHTML='';
  q.opts.forEach(function(opt,i){
    var btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML='<span class="option-letter">'+LETTERS[i]+'</span>'+opt;
    btn.onclick=function(){pick(i);};
    list.appendChild(btn);
  });
  answered=false;
}

function pick(idx){
  if(answered)return;
  answered=true;
  var q=QS[cur];
  var isOk=idx===q.a;
  if(isOk) score++;
  userAnswers.push({chosen:idx,correct:q.a,ok:isOk,exp:q.exp,q:q.q,opts:q.opts});

  var btns=document.querySelectorAll('.option-btn');
  btns.forEach(function(b,i){
    b.classList.add('disabled');
    if(i===q.a) b.classList.add('correct');
    else if(i===idx&&!isOk) b.classList.add('wrong');
  });

  var fb=document.getElementById('feedback');
  if(isOk){
    fb.textContent='✅ إجابة صحيحة! '+q.exp;
    fb.className='quiz-feedback correct-fb show';
  } else {
    fb.textContent='❌ إجابة خاطئة. '+q.exp;
    fb.className='quiz-feedback wrong-fb show';
  }
  document.getElementById('scorelabel').textContent='النتيجة: '+score+' / '+(cur+1);
  var nb=document.getElementById('next-btn');
  nb.style.display='block';
  nb.textContent=cur===QS.length-1?'عرض النتيجة 🏆':'التالي ←';
}

function next(){
  cur++;
  if(cur>=QS.length) showResult();
  else renderQ();
}

function showResult(){
  document.getElementById('quiz-section').style.display='none';
  var res=document.getElementById('result');
  res.classList.add('show');
  var pct=Math.round(score/QS.length*100);
  document.getElementById('rscore').textContent=score;
  document.getElementById('rc').textContent=score;
  document.getElementById('rw').textContent=QS.length-score;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rpctstat').textContent=pct+'%';
  setTimeout(function(){ document.getElementById('rbar').style.width=pct+'%'; },100);

  var grade,msg,sub,color;
  if(pct===100){grade='ممتاز ⭐';msg='🌟 مبروك! وضوؤك كامل!';sub='أتقنت جميع خطوات الوضوء. ما شاء الله!';color='#2e7d32';}
  else if(pct>=80){grade='جيد جداً';msg='👏 جيد جداً!';sub='فهمك ممتاز لخطوات الوضوء.';color='#1565c0';}
  else if(pct>=60){grade='جيد';msg='👍 جيد! استمر';sub='راجع بعض خطوات الوضوء لتحسين نتيجتك.';color='#e65100';}
  else{grade='يحتاج مراجعة';msg='📚 راجع خطوات الوضوء';sub='ننصحك بمراجعة خطوات الوضوء جيداً ثم إعادة الاختبار.';color='#c62828';}

  document.getElementById('rgrade').textContent=grade;
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('rmsg').style.color=color;
  document.getElementById('rsub').textContent=sub;
  document.getElementById('rcircle').style.borderColor=color;
  document.getElementById('rcircle').style.background=color+'18';
  document.getElementById('rscore').style.color=color;

  var rl=document.getElementById('review-list');
  rl.innerHTML='<p style="font-weight:700;color:var(--primary-dark);margin-bottom:10px;">مراجعة إجاباتك:</p>';
  userAnswers.forEach(function(a,i){
    var div=document.createElement('div');
    div.style.cssText='background:#fff;border:2px solid '+(a.ok?'#c8e6c9':'#ffcdd2')+';border-radius:12px;padding:12px 14px;margin-bottom:8px;';
    div.innerHTML='<div style="display:flex;align-items:flex-start;gap:8px;"><span style="font-size:1.1rem">'+(a.ok?'✅':'❌')+'</span><div><p style="font-weight:700;font-size:.9rem;margin-bottom:4px;">'+(i+1)+'. '+a.q+'</p>'+(!a.ok?'<p style="font-size:.82rem;color:#c62828;">إجابتك: '+a.opts[a.chosen]+'</p><p style="font-size:.82rem;color:#2e7d32;">الصحيح: '+a.opts[a.correct]+'</p>':'')+'</div></div>';
    rl.appendChild(div);
  });

  if(pct>=80) spawnConfetti();
}

function spawnConfetti(){
  var colors=['#1a6b4a','#f0c040','#2d9e6f','#fff','#0f4a32','#ffb300'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay=Math.random()*1.5+'s';
    el.style.transform='rotate('+Math.random()*360+'deg)';
    document.body.appendChild(el);
    setTimeout(function(){el.remove();},4000);
  }
}

function restart(){
  cur=0; score=0; answered=false; userAnswers=[];
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-section').style.display='block';
  renderQ();
}

renderQ();
</script>
</body>
</html>
